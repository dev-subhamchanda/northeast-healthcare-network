kind = "web"
previewPath = "/"
title = "Northeast Healthcare Network"
version = "1.0.0"
id = "artifacts/nhcn"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24031

[services.development]
run = "pnpm --filter @workspace/nhcn run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nhcn", "run", "build" ]
serve = "static"
publicDir = "artifacts/nhcn/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24031"
BASE_PATH = "/"
