<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Maintenance</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #fcd5af, #f5cece);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: rgb(73, 72, 72);
        text-align: center;
        padding: 20px;
    }

    .container {
        max-width: 700px;
    }

    h1 {
        font-size: 3rem;
        margin-bottom: 15px;
    }

    p {
        font-size: 1.1rem;
        opacity: 0.9;
        margin-bottom: 30px;
    }

    .tiger {
        width: 260px;
        margin: 0 auto 30px;
        animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
    }

    .badge {
        display: inline-block;
        padding: 10px 20px;
        border: 1px solid rgba(255,255,255,0.4);
        border-radius: 30px;
        backdrop-filter: blur(10px);
    }
</style>
</head>
<body>

<div class="container">

    <div class="tiger">
        <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
            <!-- Ears -->
            <circle cx="90" cy="90" r="30" fill="#f59e0b"/>
            <circle cx="210" cy="90" r="30" fill="#f59e0b"/>

            <!-- Head -->
            <circle cx="150" cy="140" r="90" fill="#f59e0b"/>

            <!-- Inner ears -->
            <circle cx="90" cy="90" r="15" fill="#fcd34d"/>
            <circle cx="210" cy="90" r="15" fill="#fcd34d"/>

            <!-- Eyes -->
            <circle cx="120" cy="130" r="8" fill="#111"/>
            <circle cx="180" cy="130" r="8" fill="#111"/>

            <!-- Nose -->
            <polygon points="150,150 138,168 162,168" fill="#111"/>

            <!-- Mouth -->
            <path d="M150 168 Q140 180 130 180" stroke="#111" stroke-width="3" fill="none"/>
            <path d="M150 168 Q160 180 170 180" stroke="#111" stroke-width="3" fill="none"/>

            <!-- Stripes -->
            <path d="M110 90 L95 120" stroke="#111" stroke-width="8" stroke-linecap="round"/>
            <path d="M190 90 L205 120" stroke="#111" stroke-width="8" stroke-linecap="round"/>
            <path d="M80 140 L105 145" stroke="#111" stroke-width="8" stroke-linecap="round"/>
            <path d="M220 140 L195 145" stroke="#111" stroke-width="8" stroke-linecap="round"/>
            <path d="M120 80 L130 110" stroke="#111" stroke-width="8" stroke-linecap="round"/>
            <path d="M180 80 L170 110" stroke="#111" stroke-width="8" stroke-linecap="round"/>

            <!-- Whiskers -->
            <line x1="95" y1="165" x2="45" y2="155" stroke="#fff" stroke-width="3"/>
            <line x1="95" y1="175" x2="45" y2="180" stroke="#fff" stroke-width="3"/>
            <line x1="205" y1="165" x2="255" y2="155" stroke="#fff" stroke-width="3"/>
            <line x1="205" y1="175" x2="255" y2="180" stroke="#fff" stroke-width="3"/>
        </svg>
    </div>

    <h1>We're Under Maintenance</h1>

    <p>
        Our team is making improvements behind the scenes.
        We'll be back online shortly.
    </p>

    <div class="badge">
        🐯 Roaring back soon...
    </div>

</div>

</body>
</html>
